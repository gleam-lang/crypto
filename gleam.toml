name = "gleam_crypto"
version = "1.5.2"
gleam = ">= 1.9.0"

licences = ["Apache-2.0"]
description = "A Gleam cryptography library supporting Erlang and JavaScript"

repository = { type = "github", user = "gleam-lang", repo = "crypto" }
links = [
  { title = "Website", href = "https://gleam.run" },
  { title = "Sponsor", href = "https://github.com/sponsors/lpil" },
]

[erlang]
extra_applications = ["crypto"]

[dependencies]
gleam_stdlib = ">= 0.71.0 and < 1.0.0"

[dev-dependencies]
gleeunit = ">= 1.9.0 and < 2.0.0"
